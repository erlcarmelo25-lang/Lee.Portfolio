<header class=".hero{
  min-height:100vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 10%;
  gap:40px;
}

.hero-text{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:flex-start;
}

.hero-image{
  flex:1;
  display:flex;
  justify-content:center;
}

.profile-pic{
  width:320px;
  height:320px;
  border-radius:50%;
  object-fit:cover;
  border:5px solid royalblue;
  box-shadow:0 0 25px rgba(65,105,225,0.5);
}

h1{
  font-size:70px;
  color:#f5deb3;
  margin-bottom:10px;
}

.subtitle{
  font-size:24px;
  color:royalblue;
  margin-bottom:25px;
}">

  <div class="hero-text">

    <h1>Lee Carmelo</h1>

    <p class="subtitle">
      Virtual Assistant | Dispatcher | Recruiter
    </p>

    <a href="#contact" class="btn">
      Contact Me
    </a>

  </div>

  <div class="hero-image">

    <img 
      src="https://imgur.com/a/yAH1Y9H"
      alt="Lee Carmelo"
      class="profile-pic"
    >

  </div>

</header>
